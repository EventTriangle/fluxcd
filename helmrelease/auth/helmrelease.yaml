apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auth-release
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/auth
      sourceRef:
        kind: GitRepository
        name: github-source
        namespace: flux-system
      interval: 1m
  values:
    replicaCount: 1