apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sender-release
  namespace: event-triangle-dev
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/sender
      sourceRef:
        kind: GitRepository
        name: github-source
        namespace: flux-system
      interval: 1m
  values:
    replicaCount: 1