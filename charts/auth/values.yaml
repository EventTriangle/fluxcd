namespace: event-triangle-dev
replicaCount: 1

secretKeyRef: "auth-secrets"

GrpcChannelAddresses: "http://sender-release-service.event-triangle-dev.svc.cluster.local:81"

image:
  # repository: kaminome/auth-service
  repository: acrsharedd01.azurecr.io/auth-service
  tag: "0.0.1-AZ400-305.1"
  pullPolicy: Always

ports:
  - containerPort: 80
  - containerPort: 81

service:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: grpc
      protocol: TCP
      port: 81
      targetPort: 81
